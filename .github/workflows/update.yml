name: Weekly Portfolio Update

on:
  schedule:
    # 매주 월요일 09:00 KST (= 일요일 00:00 UTC)
    - cron: '0 0 * * 1'
  # 수동 트리거: GitHub Actions 탭 > Run workflow
  workflow_dispatch:
  # portfolio.json 변경 시 즉시 갱신
  push:
    paths:
      - 'portfolio.json'
      - 'generate.py'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate portfolio HTML
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html rank.html history.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 시세 동일"
          else
            git commit -m "auto: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST') 포트폴리오 갱신"
            git push
          fi
