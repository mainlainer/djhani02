name: Daily Stock News

on:
  schedule:
    # 매일 08:00 KST (= 전날 23:00 UTC), 장 시작 전
    - cron: '0 23 * * *'
  # 수동 트리거: GitHub Actions 탭 > Run workflow
  workflow_dispatch:
  # news.py 변경 시 즉시 갱신
  push:
    paths:
      - 'news.py'

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate news HTML
        run: python news.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.html
          if git diff --cached --quiet; then
            echo "변경 없음 — 새 뉴스 없음"
          else
            git commit -m "auto: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST') 종목 뉴스 갱신"
            git push
          fi
